<!-- templates/result.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Fake News Detector</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/about">About</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="text-center mb-4">Prediction Result</h1>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title result {% if 'REAL' in prediction %}text-success{% else %}text-danger{% endif %}">{{ prediction }}</h5>
        <p class="card-text"><strong>Confidence:</strong> {{ confidence }}</p>
        <h6>Article:</h6>
        <p class="card-text">{{ text }}</p>
        <div class="mt-3">
          <button class="btn btn-outline-primary me-2" onclick="shareResult()">Share</button>
          <button class="btn btn-outline-secondary" onclick="exportResult()">Export</button>
          <a href="/" class="btn btn-primary ms-2">Try Another Article</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function shareResult() {
      const text = encodeURIComponent("Check out this news article prediction: {{ prediction }} - Confidence: {{ confidence }}");
      window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
    }
    function exportResult() {
      const blob = new Blob(["{{ text }}"], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'news_article.txt';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
